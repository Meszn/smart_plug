version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: smartplug_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartplug
      POSTGRES_PASSWORD: smartplug123
      POSTGRES_DB: smartplug_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartplug -d smartplug_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartplug_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartplug.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: